#     type: TARGET_ROOM_TEMPERATURE
#
# select:
#   - platform: truma_inetbox
#     name: "Modalita Ventola"
#     type: HEATER_FAN_MODE_COMBI

# LED RGB di stato del NanoC6
light:
  - platform: esp32_rmt_led_strip
    name: "LED Stato"
    id: status_led
    pin: GPIO20
    num_leds: 1
    rgb_order: GRB
    chipset: ws2812
    default_transition_length: 0s

# Sincronizza l'orologio della Truma con HA (utile per il timer)
time:
  - platform: homeassistant
    id: homeassistant_time
